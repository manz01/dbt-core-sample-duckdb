name: GOSALES CI - Pylint, SonarCloud, SQLFluff

on:
  push:
    branches:
      - dbt-core-sample-duckdb
  pull_request:
    branches:
      - dbt-core-sample-duckdb

jobs:
  python-lint-test:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pylint pytest pytest-cov pandas mysql-connector-python

    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

    - name: Run pylint
      run: |
        pylint $(git ls-files '*.py')

    - name: Create .coveragerc
      run: |
        echo "[run]" > .coveragerc
        echo "relative_files = True" >> .coveragerc
        echo "source = shared_utils" >> .coveragerc
        echo "[report]" >> .coveragerc
        echo "omit =" >> .coveragerc
        echo "    */__init__.py" >> .coveragerc
        echo "    tests/*" >> .coveragerc

    - name: Run tests with coverage
      run: |
        pytest shared_utils tests \
          --cov=shared_utils \
          --cov-report=xml:coverage.xml \
          --cov-config=.coveragerc

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      with:
        args: >
          -Dsonar.projectKey=manz01_dbt-core-sample-duckdb
          -Dsonar.organization=manz01
          -Dsonar.python.coverage.reportPaths=coverage.xml
          -Dsonar.sources=shared_utils
          -Dsonar.tests=tests
          -Dsonar.sourceEncoding=UTF-8
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sqlfluff-lint:
    name: SQLFluff Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install SQLFluff and dbt adapter
      run: |
        pip install sqlfluff sqlfluff-templater-dbt dbt-core dbt-duckdb

    - name: Install dbt packages
      run: dbt deps || true

    - name: Lint dbt models
      run: |
        sqlfluff lint models/ --format github-annotation --annotation-level failure --write-output annotations.json

    - name: Annotate PR with SQLFluff output
      if: always()
      uses: yuzutech/annotations-action@v0.4.0
      with:
        repo-token: "${{ secrets.GITHUB_TOKEN }}"
        title: "SQLFluff Lint"
        input: "./annotations.json"
