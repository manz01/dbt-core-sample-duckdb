name: GOSALES CI - SQLFluff

on:
  pull_request:
    paths:
      - "models/**"          # only run if models/ changed
      - ".sqlfluff"
      - "dbt_project.yml"
      - "macros/**"
      - "packages.yml"

jobs:
  sqlfluff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sqlfluff (dbt templater) + dbt core
        run: |
          python -m pip install --upgrade pip
          pip install "sqlfluff>=3.0.0" "sqlfluff-templater-dbt" "dbt-core>=1.10.0"

          # Optional: if you reference adapter-specific macros you can also install
          # an adapter (no CLI use): e.g. duckdb adapter
          pip install "dbt-duckdb>=1.9.0"

      - name: Read dbt profile name from dbt_project.yml
        id: profile
        run: |
          python - <<'PY'
          import yaml, sys, json
          with open('dbt_project.yml') as f:
              y = yaml.safe_load(f)
          print(f"::set-output name=name::{y.get('profile','default')}")
          PY

      - name: Create minimal dbt profiles.yml for templating
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<YAML
          ${PROFILE_NAME:-${{ steps.profile.outputs.name }}}:
            target: lint
            outputs:
              lint:
                type: duckdb
                path: ":memory:"
                schema: lint
          YAML

      - name: List changed .sql files under models/
        id: changed
        uses: tj-actions/changed-files@v45
        with:
          files: |
            models/**/*.sql

      - name: Run SQLFluff on changed files (or whole models/ if none)
        run: |
          set -e
          if [ "${{ steps.changed.outputs.any_changed }}" = "true" ]; then
            echo "Linting changed files:"
            printf "%s\n" ${{ steps.changed.outputs.all_changed_files }} | sed 's/^/ - /'
            sqlfluff lint ${{ steps.changed.outputs.all_changed_files }} --format github-annotation
          else
            echo "No changed .sql under models/. Linting entire models/ as fallback."
            sqlfluff lint models --format github-annotation
          fi

      - name: Show summary (non-blocking)
        if: ${{ always() }}
        run: |
          sqlfluff version || true
          echo "Finished SQLFluff lint."