name: GOSALES CI - SQLFluff

on:
  push:
    branches:
      - '**'        # run on main and all feature branches
  pull_request:
    branches:
      - main        # block PRs merging into main if lint fails

permissions:
  checks: write
  contents: read

jobs:
  sqlfluff-lint:
    name: SQLFluff Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install SQLFluff and dbt (DuckDB)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create minimal dbt profile (DuckDB in-memory)
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<'YAML'
          dbt_core_sample_duckdb:
            target: ci
            outputs:
              ci:
                type: duckdb
                path: ":memory:"
                threads: 4
          YAML

      - name: Install dbt packages (if packages.yml present)
        run: dbt deps || true

      # 1) Lint → write annotations.json and capture exit code (don't fail yet)
      - name: SQLFluff lint (capture exit code + write annotations)
        id: lint
        env:
          DBT_PROFILES_DIR: ~/.dbt
        run: |
          set -o pipefail
          # Machine-readable output for PR annotations
          sqlfluff lint models/ \
            --templater dbt \
            --dialect duckdb \
            --format github-annotation \
            --annotation-level failure \
            --write-output annotations.json \
            | tee sqlfluff_machine.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      # 2) Human-readable summary in the job log (doesn't influence exit code)
      - name: SQLFluff human summary (for logs)
        env:
          DBT_PROFILES_DIR: ~/.dbt
        run: |
          # This prints a readable table of failures in the Actions log
          sqlfluff lint models/ \
            --templater dbt \
            --dialect duckdb \
            --format human \
            --nocolor \
            | tee sqlfluff_human.log || true

      # 3) Post PR annotations from the file even if lint failed
      - name: Annotate PR with SQLFluff output
        if: always()
        uses: yuzutech/annotations-action@v0.4.0
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          title: "SQLFluff Lint"
          input: "./annotations.json"
          ignore-missing-file: false

      # 4) Fail the job if lint had any violations
      - name: Fail if lint failed
        if: steps.lint.outputs.exit_code != '0'
        run: |
          echo "SQLFluff reported violations. See logs and PR annotations."
          exit 1

      # (optional) Keep the logs as artifacts for debugging
      - name: Upload lint logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sqlfluff-logs
          path: |
            annotations.json
            sqlfluff_machine.log
            sqlfluff_human.log
      - name: Annotate PR with SQLFluff output
        if: always()  # still post annotations even if lint step failed
        uses: yuzutech/annotations-action@v0.4.0
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          title: "SQLFluff Lint"
          input: "./annotations.json"