name: GOSALES CI - SQLFluff

on:
  push:
    branches:
      - dbt-core-sample-duckdb
  pull_request:
    branches:
      - dbt-core-sample-duckdb

jobs:
  sqlfluff-lint:
    name: SQLFluff Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install SQLFluff and dbt adapter
      run: |
        pip install sqlfluff sqlfluff-templater-dbt dbt-core dbt-duckdb

    - name: Install dbt packages
      run: dbt deps || true

    - name: Lint dbt models with SQLFluff
      working-directory: ${{ github.workspace }}
      run: |
        sqlfluff lint models/ \
          --dialect duckdb \
          --format github-annotation \
          --annotation-level failure \
          --write-output annotations.json

    - name: Annotate PR with SQLFluff output
      if: always()
      uses: yuzutech/annotations-action@v0.4.0
      with:
        repo-token: "${{ secrets.GITHUB_TOKEN }}"
        title: "SQLFluff Lint"
        input: "./annotations.json"